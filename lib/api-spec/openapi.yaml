openapi: 3.1.0

info:
  title: Api
  version: 0.1.0
  description: API specification

servers:
- url: /api
  description: Base API path

tags:
- name: health
  description: Health operations

- name: engine
  description: Deriv trading engine

paths:

  /healthz:
    get:
      operationId: healthCheck
      tags:
      - health
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /engine/markets:
    get:
      operationId: listMarkets
      tags:
      - engine
      summary: List Markets
      responses:
        "200":
          description: Available Markets
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Market"

  /engine/status:
    get:
      operationId: getEngineStatus
      tags:
      - engine
      summary: Get Engine Status
      responses:
        "200":
          description: Current Engine Status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngineStatus"

  /engine/config:
    patch:
      operationId: updateEngineConfig
      tags:
      - engine
      summary: Update Engine Configuration
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/EngineConfigUpdate"

      responses:
        "200":
          description: Updated Engine Status
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngineStatus"

        "400":
          description: Invalid configuration
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

        "409":
          description: Engine running
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /engine/start:
    post:
      operationId: startEngine
      tags:
      - engine
      summary: Start Engine
      responses:
        "200":
          description: Started
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngineStatus"

  /engine/pause:
    post:
      operationId: pauseEngine
      tags:
      - engine
      summary: Pause Engine
      responses:
        "200":
          description: Paused
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngineStatus"

  /engine/stop:
    post:
      operationId: stopEngine
      tags:
      - engine
      summary: Stop Engine
      responses:
        "200":
          description: Stopped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/EngineStatus"

components:
  schemas:
    HealthStatus:
      type: object
      required:
      - status
      properties:
        status:
          type: string

    ErrorResponse:
      type: object
      required:
      - error
      properties:
        error:
          type: string

    Market:
      type: object
      required:
      - symbol
      - label
      properties:
        symbol:
          type: string
        label:
          type: string

    EngineConfig:
      type: object
      required:
      - market
      - accountType
      - currency
      - duration
      - stakeMode
      - baseStake
      - stakePercent
      - minimumStake
      - maximumStake
      - reserveBalance
      - martingaleEnabled
      - martingaleMultiplier
      - kellyEnabled
      - kellyFraction
      - stopLossMode
      - stopLoss
      - takeProfitMode
      - takeProfit
      - dailyLossLimit
      - dailyProfitLimit
      - maxSuccessiveLosses
      - maxSuccessiveWins
      - analysisWindow
      - minimumSamples
      - under8Threshold
      - under9Threshold
      - minimumTradeQuality

      properties:
        market:
          type: string

        accountType:
          type: string
          enum:
          - demo
          - real

        currency:
          type: string

        duration:
          type: integer

        stakeMode:
          type: string
          enum:
          - fixed
          - percentage
          - kelly

        baseStake:
          type: number

        stakePercent:
          type: number

        minimumStake:
          type: number

        maximumStake:
          type: number

        reserveBalance:
          type: number

        martingaleEnabled:
          type: boolean

        martingaleMultiplier:
          type: number

        kellyEnabled:
          type: boolean

        kellyFraction:
          type: number

        stopLossMode:
          type: string
          enum:
          - amount
          - percentage

        stopLoss:
          type: number

        takeProfitMode:
          type: string
          enum:
          - amount
          - percentage

        takeProfit:
          type: number

        dailyLossLimit:
          type: number

        dailyProfitLimit:
          type: number

        maxSuccessiveLosses:
          type: integer

        maxSuccessiveWins:
          type: integer

        analysisWindow:
          type: integer

        minimumSamples:
          type: integer

        under8Threshold:
          type: number

        under9Threshold:
          type: number

        minimumTradeQuality:
          type: number

    EngineConfigUpdate:
      type: object
      properties:
        market:
          type: string

        accountType:
          type: string
          enum:
          - demo
          - real

        currency:
          type: string

        duration:
          type: integer

        stakeMode:
          type: string
          enum:
          - fixed
          - percentage
          - kelly

        baseStake:
          type: number

        stakePercent:
          type: number

        minimumStake:
          type: number

        maximumStake:
          type: number

        reserveBalance:
          type: number

        martingaleEnabled:
          type: boolean

        martingaleMultiplier:
          type: number

        kellyEnabled:
          type: boolean

        kellyFraction:
          type: number

        stopLossMode:
          type: string
          enum:
          - amount
          - percentage

        stopLoss:
          type: number

        takeProfitMode:
          type: string
          enum:
          - amount
          - percentage

        takeProfit:
          type: number

        dailyLossLimit:
          type: number

        dailyProfitLimit:
          type: number

        maxSuccessiveLosses:
          type: integer

        maxSuccessiveWins:
          type: integer

        analysisWindow:
          type: integer

        minimumSamples:
          type: integer

        under8Threshold:
          type: number

        under9Threshold:
          type: number

        minimumTradeQuality:
          type: number
    TradeRecord:
      type: object
      required:
      - id
      - timestamp
      - market
      - signal
      - stake
      - won
      - profit
      - buyPrice
      - sellPrice
      - result

      properties:
        id:
          type: string

        timestamp:
          type: integer
          format: int64

        market:
          type: string

        signal:
          type: string
          enum:
          - UNDER8
          - UNDER9
          - NONE

        stake:
          type: number

        won:
          type: boolean

        profit:
          type: number

        buyPrice:
          type: number

        sellPrice:
          type: number

        result:
          type: string
          enum:
          - win
          - loss
    AnalysisStatus:
      type: object
      required:
      - under8Confidence
      - under9Confidence
      - tradeQuality
      - signal
      - windowFillCount
      - windowSize
      properties:
        under8Confidence:
          type:
          - number
          - "null"

        under9Confidence:
          type:
          - number
          - "null"

        tradeQuality:
          type:
          - number
          - "null"

        signal:
          type: string
          enum:
          - UNDER8
          - UNDER9
          - NONE

        windowFillCount:
          type: integer

        windowSize:
          type: integer

    SessionStatus:
      type: object
      required:
      - sessionPnl
      - totalTrades
      - wins
      - losses
      - successiveWins
      - successiveLosses
      - startedAt
      properties:
        sessionPnl:
          type: number

        totalTrades:
          type: integer

        wins:
          type: integer

        losses:
          type: integer

        successiveWins:
          type: integer

        successiveLosses:
          type: integer

        startedAt:
          type:
          - string
          - "null"

    ConnectionStatus:
      type: object
      required:
      - accountId
      - balance
      - lastTick
      - lastDigit
      - health
      properties:
        accountId:
          type:
          - string
          - "null"

        balance:
          type:
          - number
          - "null"

        lastTick:
          type:
          - number
          - "null"

        lastDigit:
          type:
          - integer
          - "null"

        health:
          type: string
          enum:
          - healthy
          - warning
          - error

    EngineStatus:
      type: object
      required:
      - state
      - config
      - connection
      - analysis
      - session
      - currentStake
      - nextStake
      - stopReason
      - errorMessage
      - recentTrades

      properties:
        state:
          type: string
          enum:
          - idle
          - starting
          - running
          - paused
          - stopping
          - stopped

        config:
          $ref: "#/components/schemas/EngineConfig"

        connection:
          $ref: "#/components/schemas/ConnectionStatus"

        analysis:
          $ref: "#/components/schemas/AnalysisStatus"

        session:
          $ref: "#/components/schemas/SessionStatus"

        currentStake:
          type: number

        nextStake:
          type: number

        stopReason:
          type:
          - string
          - "null"

        errorMessage:
          type:
          - string
          - "null"

        recentTrades:
          type: array
          items:
            $ref: "#/components/schemas/TradeRecord"
